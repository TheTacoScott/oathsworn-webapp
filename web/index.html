<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oathsworn: Into the Deepwood</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/chapters.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/save-data.css">
</head>
<body>

<!-- ============================================================
     HOME SCREEN
     ============================================================ -->
<div id="screen-home" class="screen active">
    <div class="home-wrap d-flex flex-column align-items-center justify-content-center h-100">
        <div class="text-center mb-5">
            <h1 class="game-title">OATHSWORN</h1>
            <p class="game-subtitle">Into the Deepwood</p>
        </div>
        <div class="d-flex flex-column gap-3" style="width: 280px;">
            <button id="btn-new-campaign" class="btn btn-primary-game">New Campaign</button>
            <button id="btn-continue-campaign" class="btn btn-primary-game d-none">Continue Campaign</button>
            <button id="btn-view-save" class="btn btn-ghost-game">View Saved Data</button>
        </div>
    </div>
</div>


<!-- ============================================================
     SAVE DATA SCREEN
     ============================================================ -->
<div id="screen-save-data" class="screen">
    <div class="container py-3">
        <div class="d-flex align-items-center mb-4 gap-3">
            <button id="btn-save-back" class="btn btn-ghost-game">&#8592; Back</button>
            <h4 class="mb-0 screen-heading">Saved Data</h4>
            <button id="btn-copy-save" class="btn btn-ghost-game ms-auto">Copy JSON</button>
        </div>
        <div id="save-data-content">
            <!-- populated by loadSaveDataScreen() -->
        </div>
        <details class="mt-4">
            <summary class="save-data-summary">Raw JSON</summary>
            <pre id="save-data-raw" class="save-data-raw"></pre>
        </details>
    </div>
</div>


<!-- ============================================================
     CHAPTER SELECT SCREEN
     ============================================================ -->
<div id="screen-chapters" class="screen">
    <div class="container py-3">
        <div class="d-flex align-items-center mb-4 gap-3">
            <button id="btn-chapters-back" class="btn btn-ghost-game btn-back-home">&#8592; Back</button>
            <h4 class="mb-0 screen-heading">Select Chapter</h4>
        </div>
        <div id="chapter-grid" class="row row-cols-4 row-cols-sm-6 row-cols-lg-11 g-2">
            <!-- populated by loadChapterSelectScreen() -->
        </div>
    </div>
</div>


<!-- ============================================================
     GAME SCREEN
     ============================================================ -->
<div id="screen-game" class="screen game-screen">
    <div class="game-panel d-flex flex-column">

        <!-- Game header bar -->
        <div class="game-header d-flex align-items-center justify-content-between px-3 py-2 flex-shrink-0">
            <button id="btn-game-back" class="btn btn-ghost-game">&#8592; Back</button>
            <span id="game-time" class="game-time-display">TIME: 0</span>
            <button id="btn-game-menu" class="btn btn-ghost-game">Exit to Chapter Select</button>
        </div>

        <!-- Chapter title (shown only for section 0) -->
        <div id="chapter-title-area" class="chapter-title-area text-center flex-shrink-0 d-none">
            <h2 id="chapter-title-text" class="chapter-title"></h2>
            <p id="chapter-author-text" class="chapter-author mb-0"></p>
        </div>

        <!-- Scrollable plate content -->
        <div id="game-content" class="game-content px-3 py-2">
            <!-- populated by renderPlate() -->
        </div>

        <!-- Audio controls + choice/location buttons -->
        <div class="game-bottom flex-shrink-0 px-3 pb-3">
            <div id="audio-controls" class="audio-native-area invisible">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <button id="btn-audio-prev" class="btn btn-ghost-game btn-audio-nav py-0 px-2" title="Previous / Restart">&#9198;</button>
                    <span id="audio-track-label" class="audio-track-label flex-grow-1"></span>
                    <button id="btn-audio-next" class="btn btn-ghost-game btn-audio-nav py-0 px-2" title="Next track">&#9197;</button>
                </div>
                <audio id="audio-native" controls class="w-100"></audio>
                <label class="auto-scroll-label">
                    <input type="checkbox" id="auto-scroll-check" checked> Auto Scroll
                </label>
            </div>
            <div id="choice-buttons" class="choice-buttons-area d-flex flex-column gap-2">
                <!-- populated by renderButtons() -->
            </div>
        </div>

    </div>
</div>


<!-- ============================================================
     SCRIPTS (order matters: data -> engine -> jQuery -> bootstrap -> main)
     ============================================================ -->
<script src="data/strings.js"></script>
<script src="data/chapters/init.js"></script>
<script src="data/chapters/chapter_1.js"></script>
<script src="data/chapters/chapter_2.js"></script>
<script src="data/chapters/chapter_3.js"></script>
<script src="data/chapters/chapter_4.js"></script>
<script src="data/chapters/chapter_5.js"></script>
<script src="data/chapters/chapter_6.js"></script>
<script src="data/chapters/chapter_7.js"></script>
<script src="data/chapters/chapter_8.js"></script>
<script src="data/chapters/chapter_9.js"></script>
<script src="data/chapters/chapter_10.js"></script>
<script src="data/chapters/chapter_11.js"></script>
<script src="data/chapters/chapter_22.js"></script>
<script src="data/chapters/chapter_12.js"></script>
<script src="data/chapters/chapter_13.js"></script>
<script src="data/chapters/chapter_14.js"></script>
<script src="data/chapters/chapter_15.js"></script>
<script src="data/chapters/chapter_16.js"></script>
<script src="data/chapters/chapter_17.js"></script>
<script src="data/chapters/chapter_18.js"></script>
<script src="data/chapters/chapter_19.js"></script>
<script src="data/chapters/chapter_20.js"></script>
<script src="data/chapters/chapter_21.js"></script>
<script src="data/images.js"></script>
<script src="js/game.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="js/main.js"></script>

</body>
</html>
